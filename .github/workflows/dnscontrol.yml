name: DNSControl

on:
    push:
        branches: [main]
        paths:
            - ".github/workflows/dnscontrol.yml"
            - "dnsconfig.js"

    workflow_dispatch:

concurrency:
    group: ${{ github.ref }}-dnscontrol

jobs:
    tests:
        name: Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - uses: is-a-dev/dnscontrol-action@main
              with:
                  args: check
